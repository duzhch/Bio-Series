exp_root: "/path/to/Bio-Series"

resources:
  reference_genome: "/path/to/reference/genome.fa"
  gtf_file: "/path/to/annotation/genes.gtf.gz"
  pigbert_model: "/path/to/models/pigbert"
  gene2vec_model: "/path/to/models/gene2vec.vector"
  plink_bin: "plink"
  gcta_bin: "gcta64"
  python_bin: "python"

slurm:
  cpu_partition: "cpu"
  gpu_partition: "gpu"
  cpus_per_task: 8
  mem: "64G"
  gres: "gpu:1"
  time: "24:00:00"

experiment:
  replicates: 3
  top_n_snps: 3000
  window_size: 512
  batch_size: 64
  epochs: 150
  lr: 5.0e-4
  lambda_l1: 0.005

datasets:
  Example_Population:
    plink: "/path/to/plink/prefix"
    pheno: "/path/to/phenotypes.csv"
    id_col: "sample_id"
    traits: ["TraitA", "TraitB"]
    sep: ","
