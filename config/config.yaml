exp_root: "."

resources:
  reference_genome: "./resources/reference/Sus_scrofa.Sscrofa11.1.dna.toplevel.fa"
  gtf_file: "./resources/annotation/Sus_scrofa.Sscrofa11.1.111.gtf.gz"
  pigbert_model: "./resources/models/pig_bert2_v1"
  gene2vec_model: "./resources/models/pig_gene2vec_300d.vector"
  plink_bin: "plink"
  gcta_bin: "gcta64"
  python_bin: "python"

slurm:
  cpu_partition: "cpu"
  gpu_partition: "gpu"
  cpus_per_task: 8
  mem: "64G"
  gres: "gpu:1"
  time: "24:00:00"

experiment:
  replicates: 3
  top_n_snps: 3000
  window_size: 512
  batch_size: 64
  epochs: 150
  lr: 5.0e-4
  lambda_l1: 0.005

datasets:
  LargeWhite_Pop1:
    plink: "./data/processed/LargeWhitePopulation1/plink/LargeWhitePopulation1"
    pheno: "./data/processed/LargeWhitePopulation1/pheno/phenotypes.csv"
    id_col: "sample_id"
    traits: ["BF", "TNB", "AGE"]
    sep: ","

  LargeWhite_Pop2:
    plink: "./data/processed/LargeWhitePopulation2/plink/LargeWhitePopulation2"
    pheno: "./data/processed/LargeWhitePopulation2/pheno/phenotypes.tsv"
    id_col: "sample_id"
    traits: ["BF", "AGE"]
    sep: "\t"

  American_Duroc:
    plink: "./data/processed/American_Duroc/plink/American_Duroc"
    pheno: "./data/processed/American_Duroc/pheno/phenotypes.tsv"
    id_col: "sample_id"
    traits: ["LMA", "LMD"]
    sep: "\t"

  Canadian_Duroc:
    plink: "./data/processed/Canadian_Duroc/plink/Canadian_Duroc"
    pheno: "./data/processed/Canadian_Duroc/pheno/phenotypes.tsv"
    id_col: "sample_id"
    traits: ["LMA", "LMD"]
    sep: "\t"

  Wenshi_Line1:
    plink: "./data/processed/wenshi/line1/plink/wenshi_line1"
    pheno: "./data/processed/wenshi/line1/pheno/phenotypes.tsv"
    id_col: "sample_id"
    traits: ["tnb"]
    sep: "\t"
